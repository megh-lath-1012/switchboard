name: Continuous Deployment

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build and Test
        run: ./gradlew assembleDebug test :switchboard-ksp:test --no-daemon

      - name: Build Sample App APK
        run: ./gradlew :sample:assembleDebug --no-daemon

      - name: Extract Release Notes
        id: extract_notes
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "Extracting release notes for version $VERSION"
          # Extract the section for this version from CHANGELOG.md
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" {print_flag=1; next}
            $0 ~ "^## " && print_flag {print_flag=0}
            print_flag {print}
          ' CHANGELOG.md > release_notes.md
          
          # Fallback if no specific version section was matched
          if [ ! -s release_notes.md ]; then
            echo "No matching release notes found in CHANGELOG.md for version $VERSION, using fallback."
            echo "Release of Switchboard $TAG_NAME" > release_notes.md
          fi
          cat release_notes.md

      - name: Publish to Maven Central
        run: |
          ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --no-daemon \
            -PmavenCentralUsername="${{ secrets.OSSRH_USERNAME }}" \
            -PmavenCentralPassword="${{ secrets.OSSRH_PASSWORD }}" \
            -PsigningInMemoryKeyId="${{ secrets.SIGNING_KEY_ID }}" \
            -PsigningInMemoryKeyPassword="${{ secrets.SIGNING_PASSWORD }}" \
            -PsigningInMemoryKey="${{ secrets.SIGNING_KEY }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            sample/build/outputs/apk/debug/sample-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
